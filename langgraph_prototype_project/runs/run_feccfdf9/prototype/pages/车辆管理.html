<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆管理 - 智能物流管理系统</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #262626;
        }
        .filter-section {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            width: 240px;
        }
        .filter-select {
            width: 160px;
        }
        .filter-tag {
            font-size: 12px;
            color: #fa8c16;
            display: none;
        }
        .filter-tag.active {
            display: inline;
        }
        .table-operations {
            display: flex;
            gap: 12px;
        }
        .btn-text {
            padding: 4px 8px;
            font-size: 13px;
        }
        .btn-text.danger {
            color: #ff4d4f;
        }
        .btn-text.danger:hover {
            color: #ff7875;
        }
        .status-idle { color: #13c2c2; background: #e6f7f7; }
        .status-in-use { color: #1890ff; background: #e6f7ff; }
        .status-maintenance { color: #8c8c8c; background: #f5f5f5; }
        .status-offline { color: #8c8c8c; background: #fafafa; }
        .empty-driver {
            color: #bfbfbf;
            font-style: italic;
        }
        .maintenance-tip {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #d48806;
        }
        .maintenance-tip .close-tip {
            margin-left: auto;
            cursor: pointer;
            color: #d48806;
        }
        .popover-content {
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-icon">🚛</span>
                <span class="brand-text">智能物流系统</span>
            </div>
            <nav class="nav">
                <div class="nav-section">
                    <a href="./首页.html" class="nav-link">首页</a>
                </div>
                <div class="nav-section">
                    <div class="nav-title">订单管理</div>
                    <a href="./订单列表.html" class="nav-link">订单列表</a>
                    <a href="./新建订单.html" class="nav-link">新建订单</a>
                </div>
                <div class="nav-section">
                    <div class="nav-title">车辆管理</div>
                    <a href="./车辆管理.html" class="nav-link active">车辆管理</a>
                </div>
                <div class="nav-section">
                    <div class="nav-title">司机管理</div>
                    <a href="./司机管理.html" class="nav-link">司机管理</a>
                </div>
                <div class="nav-section">
                    <div class="nav-title">智能调度</div>
                    <a href="./智能调度.html" class="nav-link">智能调度</a>
                </div>
                <div class="nav-section">
                    <div class="nav-title">运输轨迹</div>
                    <a href="./运输轨迹.html" class="nav-link">运输轨迹</a>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main">
            <!-- 顶部栏 -->
            <header class="topbar">
                <div class="breadcrumb">
                    <span class="breadcrumb-item">车辆管理</span>
                    <span class="breadcrumb-separator">/</span>
                    <span class="breadcrumb-item active">车辆列表</span>
                </div>
                <div class="topbar-actions">
                    <span class="user-info">管理员</span>
                </div>
            </header>

            <!-- 页面内容 -->
            <div class="content">
                <!-- 维保提醒 -->
                <div class="maintenance-tip" id="maintenanceTip">
                    <span>⚠️</span>
                    <span>车辆 <strong>京A12345</strong> 维保即将到期，请及时处理</span>
                    <span class="close-tip" onclick="document.getElementById('maintenanceTip').style.display='none'">✕</span>
                </div>

                <!-- 页面头部 -->
                <div class="page-header">
                    <h1 class="page-title">车辆管理</h1>
                    <button class="btn btn-primary" onclick="window.location.href='./新增车辆.html'">
                        <span>+</span> 新增车辆
                    </button>
                </div>

                <!-- 筛选区域 -->
                <div class="filter-section">
                    <div class="search-box">
                        <input type="text" class="input" id="searchInput" placeholder="输入车牌号/公司名称搜索" onkeyup="handleSearch(event)">
                    </div>
                    <select class="select filter-select" id="statusFilter" onchange="handleFilter()">
                        <option value="">全部状态</option>
                        <option value="IDLE">空闲</option>
                        <option value="IN_USE">使用中</option>
                        <option value="MAINTENANCE">维修中</option>
                        <option value="OFFLINE">离线</option>
                    </select>
                    <select class="select filter-select" id="typeFilter" onchange="handleFilter()">
                        <option value="">全部车型</option>
                        <option value="VAN">厢式货车</option>
                        <option value="FLATBED">平板车</option>
                        <option value="TANKER">罐车</option>
                        <option value="REFRIGERATED">冷藏车</option>
                        <option value="OTHER">其他</option>
                    </select>
                    <span class="filter-tag" id="filterTag">已筛选</span>
                    <button class="btn btn-ghost" id="clearFilterBtn" onclick="clearFilter()" style="display: none;">清除筛选</button>
                </div>

                <!-- 表格区域 -->
                <div class="card">
                    <div class="table-wrap">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th style="width: 60px;">序号</th>
                                    <th>车牌号</th>
                                    <th>车型</th>
                                    <th>载重(吨)</th>
                                    <th>所属公司</th>
                                    <th>状态</th>
                                    <th>当前司机</th>
                                    <th>更新时间</th>
                                    <th style="width: 120px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="vehicleTableBody">
                                <!-- 动态渲染 -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 空状态 -->
                    <div class="empty" id="emptyState" style="display: none;">
                        <div class="empty-icon">📦</div>
                        <div class="empty-text">暂无车辆信息</div>
                        <button class="btn btn-primary" onclick="window.location.href='./新增车辆.html'">新增车辆</button>
                    </div>

                    <!-- 加载状态 -->
                    <div class="loading" id="loadingState" style="display: none;">
                        <div class="loading-spinner"></div>
                        <div class="loading-text">加载中...</div>
                    </div>

                    <!-- 分页 -->
                    <div class="pagination-wrap" id="paginationWrap">
                        <div class="pagination-info">
                            共 <span id="totalCount">0</span> 条记录，第 <span id="currentPage">1</span>/<span id="totalPages">1</span> 页
                        </div>
                        <div class="pagination">
                            <button class="pagination-btn" onclick="changePage(-1)" id="prevBtn">上一页</button>
                            <button class="pagination-btn" onclick="changePage(1)" id="nextBtn">下一页</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal" id="deleteModal" style="display: none;">
        <div class="modal-mask" onclick="closeDeleteModal()"></div>
        <div class="modal-content" style="width: 400px;">
            <div class="modal-header">
                <div class="modal-title">确认删除</div>
                <button class="modal-close" onclick="closeDeleteModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="popover-content">
                    <p>确定要删除车辆 <strong id="deletePlateNumber"></strong> 吗？</p>
                    <p style="color: #8c8c8c; font-size: 13px; margin-top: 8px;">此操作不可恢复，请谨慎操作</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast" style="display: none;">
        <span class="toast-message" id="toastMessage"></span>
    </div>

    <script src="../assets/js/mock-data.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        // 模拟车辆数据
        const mockVehicles = [
            { id: 'V001', plateNumber: '京A12345', vehicleType: 'VAN', loadCapacity: 5, company: '北京物流公司', status: 'IDLE', driverName: '-', phone: '13800138001', updateTime: '2024-01-15 10:30:00', insuranceExpiry: '2024-06-15', nextMaintenanceDate: '2024-02-01' },
            { id: 'V002', plateNumber: '京B67890', vehicleType: 'FLATBED', loadCapacity: 15, company: '北京物流公司', status: 'IN_USE', driverName: '张三', phone: '13800138002', updateTime: '2024-01-15 09:20:00', insuranceExpiry: '2024-05-20', nextMaintenanceDate: '2024-01-25' },
            { id: 'V003', plateNumber: '沪C11111', vehicleType: 'TANKER', loadCapacity: 20, company: '上海运输集团', status: 'IDLE', driverName: '-', phone: '13800138003', updateTime: '2024-01-14 16:45:00', insuranceExpiry: '2024-07-10', nextMaintenanceDate: '2024-02-15' },
            { id: 'V004', plateNumber: '沪D22222', vehicleType: 'REFRIGERATED', loadCapacity: 8, company: '上海运输集团', status: 'IN_USE', driverName: '李四', phone: '13800138004', updateTime: '2024-01-15 08:15:00', insuranceExpiry: '2024-04-30', nextMaintenanceDate: '2024-02-10' },
            { id: 'V005', plateNumber: '粤E33333', vehicleType: 'VAN', loadCapacity: 5, company: '广州货运公司', status: 'MAINTENANCE', driverName: '-', phone: '13800138005', updateTime: '2024-01-13 14:00:00', insuranceExpiry: '2024-08-15', nextMaintenanceDate: '2024-01-13' },
            { id: 'V006', plateNumber: '粤F44444', vehicleType: 'FLATBED', loadCapacity: 18, company: '广州货运公司', status: 'IDLE', driverName: '-', phone: '13800138006', updateTime: '2024-01-15 11:00:00', insuranceExpiry: '2024-06-25', nextMaintenanceDate: '2024-02-20' },
            { id: 'V007', plateNumber: '浙G55555', vehicleType: 'TANKER', loadCapacity: 25, company: '杭州运输', status: 'IN_USE', driverName: '王五', phone: '13800138007', updateTime: '2024-01-15 07:30:00', insuranceExpiry: '2024-05-10', nextMaintenanceDate: '2024-02-05' },
            { id: 'V008', plateNumber: '浙H66666', vehicleType: 'OTHER', loadCapacity: 10, company: '杭州运输', status: 'OFFLINE', driverName: '-', phone: '13800138008', updateTime: '2024-01-12 20:00:00', insuranceExpiry: '2024-09-01', nextMaintenanceDate: '2024-03-01' },
            { id: 'V009', plateNumber: '京J77777', vehicleType: 'VAN', loadCapacity: 3, company: '北京物流公司', status: 'IDLE', driverName: '-', phone: '13800138009', updateTime: '2024-01-15 12:00:00', insuranceExpiry: '2024-07-20', nextMaintenanceDate: '2024-02-25' },
            { id: 'V010', plateNumber: '京K88888', vehicleType: 'FLATBED', loadCapacity: 12, company: '北京物流公司', status: 'IN_USE', driverName: '赵六', phone: '13800138010', updateTime: '2024-01-14 18:30:00', insuranceExpiry: '2024-04-15', nextMaintenanceDate: '2024-01-28' },
            { id: 'V011', plateNumber: '沪L99999', vehicleType: 'REFRIGERATED', loadCapacity: 6, company: '上海运输集团', status: 'IDLE', driverName: '-', phone: '13800138011', updateTime: '2024-01-15 13:45:00', insuranceExpiry: '2024-08-30', nextMaintenanceDate: '2024-03-10' },
            { id: 'V012', plateNumber: '粤M00000', vehicleType: 'TANKER', loadCapacity: 22, company: '广州货运公司', status: 'MAINTENANCE', driverName: '-', phone: '13800138012', updateTime: '2024-01-10 09:00:00', insuranceExpiry: '2024-06-05', nextMaintenanceDate: '2024-01-10' },
            { id: 'V013', plateNumber: '浙N11111', vehicleType: 'VAN', loadCapacity: 4, company: '杭州运输', status: 'IN_USE', driverName: '孙七', phone: '13800138013', updateTime: '2024-01-15 06:20:00', insuranceExpiry: '2024-05-25', nextMaintenanceDate: '2024-02-08' },
            { id: 'V014', plateNumber: '京P22222', vehicleType: 'FLATBED', loadCapacity: 16, company: '北京物流公司', status: 'OFFLINE', driverName: '-', phone: '13800138014', updateTime: '2024-01-11 22:00:00', insuranceExpiry: '2024-07-15', nextMaintenanceDate: '2024-02-18' },
            { id: 'V015', plateNumber: '沪Q33333', vehicleType: 'OTHER', loadCapacity: 8, company: '上海运输集团', status: 'IDLE', driverName: '-', phone: '13800138015', updateTime: '2024-01-15 14:30:00', insuranceExpiry: '2024-09-10', nextMaintenanceDate: '2024-03-05' }
        ];

        // 状态映射
        const statusMap = {
            'IDLE': { text: '空闲', class: 'status-idle' },
            'IN_USE': { text: '使用中', class: 'status-in-use' },
            'MAINTENANCE': { text: '维修中', class: 'status-maintenance' },
            'OFFLINE': { text: '离线', class: 'status-offline' }
        };

        // 车型映射
        const typeMap = {
            'VAN': '厢式货车',
            'FLATBED': '平板车',
            'TANKER': '罐车',
            'REFRIGERATED': '冷藏车',
            'OTHER': '其他'
        };

        // 分页变量
        let currentPage = 1;
        const pageSize = 10;
        let filteredData = [...mockVehicles];

        // 删除相关
        let deleteTargetId = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderTable();
            updateFilterTag();
        });

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('vehicleTableBody');
            const emptyState = document.getElementById('emptyState');
            const loadingState = document.getElementById('loadingState');
            const tableWrap = document.querySelector('.table-wrap');

            // 显示加载状态
            loadingState.style.display = 'block';
            tableWrap.style.display = 'none';
            emptyState.style.display = 'none';

            // 模拟加载
            setTimeout(() => {
                const start = (currentPage - 1) * pageSize;
                const end = start + pageSize;
                const pageData = filteredData.slice(start, end);

                loadingState.style.display = 'none';

                if (pageData.length === 0) {
                    emptyState.style.display = 'flex';
                    document.getElementById('paginationWrap').style.display = 'none';
                    return;
                }

                tableWrap.style.display = 'block';
                document.getElementById('paginationWrap').style.display = 'flex';

                tbody.innerHTML = pageData.map((vehicle, index) => {
                    const statusInfo = statusMap[vehicle.status];
                    const canEdit = vehicle.status === 'IDLE' || vehicle.status === 'OFFLINE';
                    const canDelete = vehicle.status === 'IDLE' || vehicle.status === 'OFFLINE';

                    return `
                        <tr onclick="viewDetail('${vehicle.id}')" style="cursor: pointer;">
                            <td>${start + index + 1}</td>
                            <td><strong>${vehicle.plateNumber}</strong></td>
                            <td>${typeMap[vehicle.vehicleType] || vehicle.vehicleType}</td>
                            <td>${vehicle.loadCapacity}</td>
                            <td>${vehicle.company}</td>
                            <td><span class="badge ${statusInfo.class}">${statusInfo.text}</span></td>
                            <td class="${vehicle.driverName === '-' ? 'empty-driver' : ''}">${vehicle.driverName}</td>
                            <td>${vehicle.updateTime}</td>
                            <td class="table-operations" onclick="event.stopPropagation()">
                                <button class="btn btn-text ${canEdit ? '' : 'disabled'}" 
                                    ${canEdit ? `onclick="editVehicle('${vehicle.id}')"` : 'disabled title="使用中/维修中车辆不允许编辑"'}
                                    style="${canEdit ? '' : 'color: #d9d9d9; cursor: not-allowed;'}">
                                    编辑
                                </button>
                                <button class="btn btn-text danger ${canDelete ? '' : 'disabled'}"
                                    ${canDelete ? `onclick="deleteVehicle('${vehicle.id}', '${vehicle.plateNumber}')"` : 'disabled title="使用中/维修中车辆不允许删除"'}
                                    style="${canDelete ? '' : 'color: #d9d9d9; cursor: not-allowed;'}">
                                    删除
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');

                // 更新分页信息
                updatePagination();
            }, 300);
        }

        // 更新分页
        function updatePagination() {
            const total = filteredData.length;
            const totalPage = Math.ceil(total / pageSize);

            document.getElementById('totalCount').textContent = total;
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPage;

            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPage;
        }

        // 翻页
        function changePage(delta) {
            const totalPage = Math.ceil(filteredData.length / pageSize);
            const newPage = currentPage + delta;

            if (newPage >= 1 && newPage <= totalPage) {
                currentPage = newPage;
                renderTable();
                // 滚动到顶部
                document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // 搜索
        function handleSearch(event) {
            if (event.key === 'Enter') {
                doSearch();
            }
        }

        function doSearch() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

            filteredData = mockVehicles.filter(vehicle => {
                if (!keyword) return true;
                return vehicle.plateNumber.toLowerCase().includes(keyword) ||
                       vehicle.company.toLowerCase().includes(keyword);
            });

            // 应用其他筛选
            applyFilters();
        }

        // 筛选
        function handleFilter() {
            applyFilters();
        }

        function applyFilters() {
            const statusFilter = document.getElementById('statusFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;

            filteredData = mockVehicles.filter(vehicle => {
                const matchStatus = !statusFilter || vehicle.status === statusFilter;
                const matchType = !typeFilter || vehicle.vehicleType === typeFilter;
                return matchStatus && matchType;
            });

            // 应用搜索
            doSearch();

            currentPage = 1;
            renderTable();
            updateFilterTag();
        }

        // 清除筛选
        function clearFilter() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('typeFilter').value = '';
            filteredData = [...mockVehicles];
            currentPage = 1;
            renderTable();
            updateFilterTag();
        }

        // 更新筛选标签
        function updateFilterTag() {
            const hasFilter = document.getElementById('searchInput').value ||
                            document.getElementById('statusFilter').value ||
                            document.getElementById('typeFilter').value;

            document.getElementById('filterTag').classList.toggle('active', hasFilter);
            document.getElementById('clearFilterBtn').style.display = hasFilter ? 'inline-block' : 'none';
        }

        // 查看详情
        function viewDetail(id) {
            window.location.href = `./车辆详情.html?id=${id}`;
        }

        // 编辑车辆
        function editVehicle(id) {
            window.location.href = `./编辑车辆.html?id=${id}`;
        }

        // 删除车辆
        function deleteVehicle(id, plateNumber) {
            deleteTargetId = id;
            document.getElementById('deletePlateNumber').textContent = plateNumber;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        // 关闭删除弹窗
        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
            deleteTargetId = null;
        }

        // 确认删除
        function confirmDelete() {
            if (!deleteTargetId) return;

            // 模拟删除
            const index = mockVehicles.findIndex(v => v.id === deleteTargetId);
            if (index > -1) {
                mockVehicles.splice(index, 1);
                filteredData = filteredData.filter(v => v.id !== deleteTargetId);

                // 重新计算页码
                const totalPage = Math.ceil(filteredData.length / pageSize);
                if (currentPage > totalPage && totalPage > 0) {
                    currentPage = totalPage;
                }

                renderTable();
                showToast('删除成功', 'success');
            }

            closeDeleteModal();
        }

        // 显示 Toast
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');

            toast.className = `toast toast-${type}`;
            toastMessage.textContent = message;
            toast.style.display = 'flex';

            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
