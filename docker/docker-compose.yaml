services:
  hermes-default:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-default
    restart: unless-stopped
    command: gateway run

    ports:
      - "8642:8642"
      - "9119:9119"

    volumes:
      - ${HOME}/.hermes:/opt/data:rw

    environment:
      HOME: /opt/data
      HERMES_DATA_DIR: /opt/data

      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"

      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: "${HERMES_DEFAULT_API_KEY:-fiskzcVqn3frVcd}"
      API_SERVER_MODEL_NAME: "default"
      API_SERVER_CORS_ORIGINS: "*"

    user: "${UID:-1000}:${GID:-1000}"
    shm_size: "1gb"

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  hermes-prototype:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-prototype
    restart: unless-stopped
    command: hermes -p prototype gateway run

    ports:
      - "8643:8643"

    volumes:
      - ${HOME}/.hermes:/opt/data:rw

    environment:
      HOME: /opt/data
      HERMES_DATA_DIR: /opt/data

      HERMES_DASHBOARD: "0"

      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8643"
      API_SERVER_KEY: "${HERMES_CODER_API_KEY:-fiskzcVqn3frVcd}"
      API_SERVER_MODEL_NAME: "coder"
      API_SERVER_CORS_ORIGINS: "*"

    user: "${UID:-1000}:${GID:-1000}"
    shm_size: "1gb"

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0" 